<script>
// 1. 核心修复：启动逻辑与自动播放
document.getElementById('enter-btn').addEventListener('click', function() {
    document.getElementById('startup-overlay').classList.add('fade-out');
    var iframe = document.getElementById('ext-iframe');
    // 点击后才赋值 src，触发真实加载并实现自动播放
    iframe.src = iframe.getAttribute('data-src');
    document.getElementById('iframePanel').style.display = 'block';
});

// 2. 侧边栏交互修复
document.getElementById('toggleIframeBtn').addEventListener('click', function() {
    var panel = document.getElementById('iframePanel');
    panel.style.display = (panel.style.display === 'none') ? 'block' : 'none';
});

document.getElementById('backToTopBtn').addEventListener('click', function() {
    window.scrollTo({ top: 0, behavior: 'smooth' });
});

window.addEventListener('scroll', function() {
    document.getElementById('backToTopBtn').style.display = (window.scrollY > 300) ? 'flex' : 'none';
});

// 3. 加载时间统计
window.addEventListener('load', function() {
    setTimeout(function() {
        let timing = performance.getEntriesByType('navigation')[0];
        if (timing && timing.loadEventEnd > 0) {
            document.getElementById('loadTime').innerHTML = ' • 加载: ' + Math.round(timing.loadEventEnd) + 'ms';
        }
    }, 0);
});

// 4. 🌟 重点：站内无刷新跳转逻辑 (PJAX 模拟) 🌟
// 这段代码会让所有的站内链接点击后只刷新 #content 区域，而不刷新整个网页，从而保证 iframe 里的音乐不断
document.addEventListener('click', function(e) {
    let t = e.target.closest('a');
    if (t && t.href && t.href.indexOf(window.location.origin) === 0 && !t.getAttribute('target')) {
        e.preventDefault();
        const url = t.href;
        fetch(url).then(r => r.text()).then(html => {
            const parser = new DOMParser();
            const doc = parser.parseFromString(html, 'text/html');
            // 只替换内容区和标题
            document.getElementById('content').innerHTML = doc.getElementById('content').innerHTML;
            document.title = doc.title;
            window.history.pushState(null, '', url);
            // 重新执行新内容里的脚本（如评论插件）
            window.scrollTo(0, 0);
        }).catch(err => window.location.href = url); // 失败则回退到普通跳转
    }
});
</script>
