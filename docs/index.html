    if(themeSettings[newMode]){
        changeTheme(...themeSettings[newMode]);

<script>
// 1. 页面精确加载时间统计
window.addEventListener('load', function() {
    setTimeout(function() {
        let loadTimeSpan = document.getElementById('loadTime');
        if (loadTimeSpan) {
            let timing = performance.getEntriesByType('navigation')[0];
            if (timing.loadEventEnd > 0) {
                let loadTime = Math.round(timing.loadEventEnd);
                loadTimeSpan.innerHTML = '页面加载时间: ' + loadTime + 'ms';
            }
        }
    }, 0);
});

// 2. 监听滚动事件：控制返回顶部按钮的显示与隐藏
window.addEventListener('scroll', function() {
    var backToTopBtn = document.getElementById('backToTopBtn');
    // 当页面向下滚动超过 300 像素时，显示按钮
    if (window.scrollY > 300) {
        backToTopBtn.style.display = 'flex'; // 使用 flex 保持图标居中
    } else {
        backToTopBtn.style.display = 'none';
    }
});

// 3. 回到顶部平滑滚动逻辑
document.getElementById('backToTopBtn').addEventListener('click', function() {
    window.scrollTo({ top: 0, behavior: 'smooth' });
});

// 4. 展开面板及懒加载 iframe 逻辑
document.getElementById('toggleIframeBtn').addEventListener('click', function() {
    var panel = document.getElementById('iframePanel');
    var iframe = document.getElementById('customIframe');

    if (panel.style.display === 'block') {
        // 如果面板已展开，则收起
        panel.style.display = 'none';
    } else {
        // 如果面板未展开，先检查 iframe 是否已经加载了 src
        var dataSrc = iframe.getAttribute('data-src');
        var currentSrc = iframe.getAttribute('src');
        
        // 初次点击：把 data-src 填入 src，正式触发加载
        if (!currentSrc && dataSrc) {
            iframe.setAttribute('src', dataSrc);
        }
        
        // 显示面板
        panel.style.display = 'block';
    }
});
</script>
